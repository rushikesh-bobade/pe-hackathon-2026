version: "3.9"

services:
  # ─── Application Service ────────────────────────────────────────────────────
  app:
    build: .
    container_name: url-shortener
    ports:
      - "5000:5000"
    environment:
      DATABASE_NAME: hackathon_db
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
    depends_on:
      db:
        condition: service_healthy
    # ─── Chaos Engineering: Auto-restart on failure (Gold Tier) ─────────────
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ─── Database Service ────────────────────────────────────────────────────────
  db:
    image: postgres:16
    container_name: url-shortener-db
    environment:
      POSTGRES_DB: hackathon_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Database also restarts automatically
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
